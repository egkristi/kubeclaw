apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclaws.openclaw.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: openclaw.io
  names:
    kind: OpenClaw
    listKind: OpenClawList
    plural: openclaws
    singular: openclaw
    shortNames:
    - oc
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: OpenClaw is the Schema for the openclaws API
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource'
            type: string
          metadata:
            type: object
          spec:
            description: OpenClawSpec defines the desired state of OpenClaw
            type: object
            properties:
              workspace:
                description: Workspace configuration
                type: object
                properties:
                  repository:
                    description: Git repository URL
                    type: string
                  branch:
                    description: Git branch
                    type: string
                    default: main
                  credentials:
                    description: Credentials for private repositories
                    type: object
                    properties:
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Secret namespace
                        type: string
              model:
                description: Model configuration
                type: object
                properties:
                  provider:
                    description: 'Provider: anthropic, openai, ollama'
                    type: string
                    enum:
                    - anthropic
                    - openai
                    - ollama
                  apiKeySecretRef:
                    description: Secret containing API key
                    type: string
                  model:
                    description: Model identifier
                    type: string
                  baseURL:
                    description: Custom endpoint URL
                    type: string
              security:
                description: Security policies
                type: object
                properties:
                  sandbox:
                    description: Sandbox configuration
                    type: object
                    properties:
                      enabled:
                        description: Enable sandboxing
                        type: boolean
                        default: true
                      landlock:
                        description: Enable Landlock filesystem sandboxing
                        type: boolean
                        default: true
                      seccomp:
                        description: Enable seccomp
                        type: boolean
                        default: true
                      networkPolicy:
                        description: Enable network policy
                        type: boolean
                        default: true
                  egress:
                    description: Egress policy
                    type: object
                    properties:
                      mode:
                        description: 'Mode: whitelist, blacklist, deny-all'
                        type: string
                        enum:
                        - whitelist
                        - blacklist
                        - deny-all
                        default: whitelist
                      allowedDomains:
                        description: Allowed domains for whitelist
                        type: array
                        items:
                          type: string
                      blockedDomains:
                        description: Blocked domains for blacklist
                        type: array
                        items:
                          type: string
              resources:
                description: Resource requirements
                type: object
                properties:
                  requests:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                  limits:
                    type: object
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                      ephemeral-storage:
                        type: string
              channels:
                description: Channel configurations
                type: object
                properties:
                  telegram:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      tokenSecretRef:
                        description: Secret containing bot token
                        type: string
                  email:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      smtpSecretRef:
                        description: Secret containing SMTP credentials
                        type: string
                  webhook:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      port:
                        type: integer
                        default: 8080
          status:
            description: OpenClawStatus defines the observed state
            type: object
            properties:
              phase:
                description: 'Phase: Pending, Running, Failed, Terminating'
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
              podName:
                description: Pod name running the instance
                type: string
              lastError:
                description: Last error message
                type: string
              workspaceSynced:
                description: Workspace sync status
                type: boolean
    subresources:
      status: {}

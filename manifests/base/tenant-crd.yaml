apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawtenants.openclaw.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: openclaw.io
  names:
    kind: OpenClawTenant
    listKind: OpenClawTenantList
    plural: openclawtenants
    singular: openclawtenant
    shortNames:
    - oct
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        description: OpenClawTenant defines a multi-tenant namespace for OpenClaw instances
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: OpenClawTenantSpec defines the desired state of a tenant
            type: object
            properties:
              displayName:
                description: Display name for the tenant
                type: string
              description:
                description: Description of the tenant's purpose
                type: string
              owner:
                description: Owner reference (user or team)
                type: string
              maxInstances:
                description: Maximum number of OpenClaw instances allowed
                type: integer
                minimum: 0
                maximum: 100
              resourceQuota:
                description: Resource quotas for this tenant
                type: object
                properties:
                  hardCPU:
                    description: Total CPU limit across all instances
                    type: string
                  hardMemory:
                    description: Total memory limit across all instances
                    type: string
                  hardStorage:
                    description: Total storage limit
                    type: string
                  hardPVCs:
                    description: Total number of PVCs allowed
                    type: integer
                  hardServices:
                    description: Total number of services
                    type: integer
                  hardPods:
                    description: Total number of pods
                    type: integer
              limitRange:
                description: Limit ranges for this tenant
                type: object
                properties:
                  defaultCPURequest:
                    type: string
                  defaultCPULimit:
                    type: string
                  defaultMemoryRequest:
                    type: string
                  defaultMemoryLimit:
                    type: string
                  defaultStorageRequest:
                    type: string
                  minCPU:
                    type: string
                  maxCPU:
                    type: string
                  minMemory:
                    type: string
                  maxMemory:
                    type: string
              networkIsolation:
                description: Network isolation configuration
                type: object
                properties:
                  enabled:
                    description: Enable namespace-level network isolation
                    type: boolean
                    default: true
                  allowedIngressNamespaces:
                    description: Allow ingress from these namespaces
                    type: array
                    items:
                      type: string
                  allowedEgressNamespaces:
                    description: Allow egress to these namespaces
                    type: array
                    items:
                      type: string
                  allowedExternalDomains:
                    description: Additional allowed external domains
                    type: array
                    items:
                      type: string
                  denyAllExternal:
                    description: Deny all external egress
                    type: boolean
                    default: false
              labels:
                description: Labels to apply to all resources
                type: object
                additionalProperties:
                  type: string
              annotations:
                description: Annotations to apply to all resources
                type: object
                additionalProperties:
                  type: string
          status:
            description: OpenClawTenantStatus defines the observed state
            type: object
            properties:
              phase:
                description: 'Current phase: Pending, Active, Terminating, Failed'
                type: string
              instanceCount:
                description: Number of OpenClaw instances in this tenant
                type: integer
              usedResources:
                description: Current resource usage
                type: object
                properties:
                  usedCPU:
                    type: string
                  usedMemory:
                    type: string
                  usedStorage:
                    type: string
                  usedPVCs:
                    type: integer
                  usedPods:
                    type: integer
                  usedServices:
                    type: integer
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
              createdAt:
                type: string
                format: date-time
    additionalPrinterColumns:
    - name: Display Name
      type: string
      jsonPath: .spec.displayName
    - name: Instances
      type: integer
      jsonPath: .status.instanceCount
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}

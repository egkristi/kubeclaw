apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeclaw-operator
  namespace: kubeclaw-system
  labels:
    app.kubernetes.io/name: kubeclaw-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeclaw-operator
  labels:
    app.kubernetes.io/name: kubeclaw-operator
rules:
  # OpenClaw CRD management
  - apiGroups:
      - openclaw.io
    resources:
      - openclaws
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - openclaw.io
    resources:
      - openclaws/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - openclaw.io
    resources:
      - openclaws/finalizers
    verbs:
      - update
  # Pod management
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # ConfigMap and Secret management
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
      - services
      - persistentvolumeclaims
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # NetworkPolicy management
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Event recording
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # ServiceAccount management
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # RBAC management for OpenClaw instances
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeclaw-operator
  labels:
    app.kubernetes.io/name: kubeclaw-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeclaw-operator
subjects:
  - kind: ServiceAccount
    name: kubeclaw-operator
    namespace: kubeclaw-system

  - operator

# Home page
home: https://github.com/egkristi/kubeclaw

# Sources
sources:
  - https://github.com/egkristi/kubeclaw

# Maintainers
maintainers:
  - name: Erling Kristiansen
    email: egkristi@gmail.com

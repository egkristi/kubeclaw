# OpenClaw instance using OpenAI instead of Anthropic
apiVersion: openclaw.io/v1alpha1
kind: OpenClaw
metadata:
  name: openai-assistant
  namespace: default
spec:
  model:
    provider: openai
    apiKeySecretRef: openai-api-key
    model: gpt-4-turbo

  security:
    sandbox:
      enabled: true
      seccomp: true
      networkPolicy: true
    egress:
      mode: whitelist
      allowedDomains:
        - api.openai.com

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: default
type: Opaque
stringData:
  api-key: "your-openai-api-key-here"

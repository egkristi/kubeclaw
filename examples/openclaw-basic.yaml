# Basic OpenClaw instance with minimal configuration
# Uses EmptyDir storage (ephemeral), good for testing
apiVersion: openclaw.io/v1alpha1
kind: OpenClaw
metadata:
  name: basic-assistant
  namespace: default
spec:
  model:
    provider: anthropic
    apiKeySecretRef: anthropic-api-key
    model: claude-sonnet-4-20250514
  
  security:
    sandbox:
      enabled: true
      seccomp: true
      networkPolicy: true
    egress:
      mode: whitelist
      allowedDomains:
        - api.anthropic.com

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
---
# Create the API key secret (replace with your actual key)
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: default
type: Opaque
stringData:
  api-key: "your-anthropic-api-key-here"
